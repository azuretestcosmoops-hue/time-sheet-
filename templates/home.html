<!DOCTYPE html>
<html>
<head>
    <title>Home - Timesheet</title>
    <style>
        body { font-family: Arial; background: #f5f6fa; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        a { color: red; text-decoration: none; }
        .btn { padding: 10px; background: green; color: white; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Your Timesheets</h2>

    <a class="btn" href="/create/">Create New</a>

    <table>
        <tr>
            <th>Date</th>
            <th>Hours</th>
            <th>Description</th>
            <th>Action</th>
        </tr>

        {% for t in timesheets %}
        <tr>
            <td>{{ t.date }}</td>
            <td>{{ t.hours }}</td>
            <td>{{ t.description }}</td>
            <td>
                <a href="/delete/{{ t.id }}/">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
