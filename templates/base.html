<!DOCTYPE html>
<html>

<head>

<title>Timesheet UI</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

.navbar{
    background:#0d6efd;
    color:white;
    padding:20px;
    font-size:30px;
}

.container{
    width:80%;
    margin:auto;
    margin-top:30px;
    background:white;
    padding:30px;
    border-radius:10px;
}

.btn{
    background:green;
    color:white;
    padding:12px 20px;
    text-decoration:none;
    border:none;
    border-radius:5px;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

table, th, td{
    border:1px solid #ccc;
}

th{
    background:#0d6efd;
    color:white;
}

th, td{
    padding:15px;
    text-align:center;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:20px;
}

</style>

</head>

<body>

<div class="navbar">
Employee Timesheet Dashboard
</div>

<div class="container">

{% block content %}
{% endblock %}

</div>

</body>
</html>
