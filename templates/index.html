<!DOCTYPE html>
<html>

<head>
<title>Timesheet Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f5f7fb;
}

/* Top Header */
.header{
    background:#2563eb;
    color:white;
    padding:18px 25px;
    font-size:22px;
    font-weight:bold;
}

/* Container */
.container{
    width:85%;
    margin:auto;
    margin-top:20px;
}

/* Welcome box */
.welcome{
    background:white;
    padding:15px 20px;
    border-radius:10px;
    margin-bottom:15px;
    font-size:18px;
}

/* Form Card */
.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

/* Inputs */
input, textarea{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:6px;
    outline:none;
}

input:focus, textarea:focus{
    border-color:#2563eb;
}

/* Button */
button{
    background:#2563eb;
    color:white;
    padding:12px 18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

/* Table */
table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

th{
    background:#f1f5f9;
    padding:12px;
    text-align:left;
}

td{
    padding:12px;
    border-top:1px solid #eee;
}

</style>

</head>

<body>

<div class="header">
Employee Timesheet Dashboard
</div>

<div class="container">

<div class="welcome">
Welcome <b>Poornish</b>
</div>

<!-- TASK FORM -->
<div class="card">

<h3>Add Task</h3>

<form>

<label>Date</label>
<input type="date">

<label>Task</label>
<textarea placeholder="Enter task update"></textarea>

<label>Hours Spent</label>
<input type="number">

<label>Comments</label>
<textarea placeholder="Enter comments"></textarea>

<button>Add Task</button>

</form>

</div>

<!-- TABLE -->
<div class="card">

<h3>Timesheet Records</h3>

<table>

<tr>
<th>User</th>
<th>Task</th>
<th>Hours</th>
<th>Date</th>
<th>Comments</th>
</tr>

<tr>
<td>Poornish</td>
<td>Django work</td>
<td>2</td>
<td>2026-05-22</td>
<td>Completed module</td>
</tr>

</table>

</div>

</div>

</body>
</html>
