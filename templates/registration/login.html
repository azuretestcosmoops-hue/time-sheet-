<!DOCTYPE html>
<html>
<head>

    <title>Employee Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial;
            background:linear-gradient(to right,#2563eb,#1e3a8a);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:400px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0px 5px 20px rgba(0,0,0,0.2);
        }

        .logo{
            text-align:center;
            font-size:45px;
            margin-bottom:15px;
        }

        h1{
            text-align:center;
            color:#1e293b;
            margin-bottom:10px;
        }

        .sub-text{
            text-align:center;
            color:#64748b;
            margin-bottom:30px;
        }

        label{
            font-weight:bold;
            color:#334155;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:8px;
            margin-bottom:20px;
            border:1px solid #cbd5e1;
            border-radius:8px;
        }

        button{
            width:100%;
            background:#2563eb;
            color:white;
            padding:14px;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <div class="logo">
            🔐
        </div>

        <h1>Employee Login</h1>

        <p class="sub-text">
            Timesheet Management System
        </p>

        <form method="post">

            {% csrf_token %}

            <label>Username</label>
            <input type="text" name="username">

            <label>Password</label>
            <input type="password" name="password">

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>
</html>
