<!DOCTYPE html>
<html lang="en">
<head>  
<meta charset="UTF-8">
<title>Multi Task Add</title>
        
<style>
    body {
        margin: 0;
        font-family: Arial;
        background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
        color: white;
        display: flex;
        justify-content: center;
        padding: 40px;
    }
        
    .box {
        width: 750px;
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(12px);
        padding: 25px;
        border-radius: 15px;
    }
        
    h2 {
        text-align: center;
        margin-bottom: 20px;
    }
        
    .row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
        gap: 10px;
        margin-bottom: 10px;
    }
        
    input, textarea, select {
        padding: 8px;
        border-radius: 6px;
        border: none;
        outline: none;
    }
        
    textarea {
        resize: none;
        height: 35px;
        margin-bottom: 10px;
    }  

    .btn {
        padding: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;   
        margin-top: 10px;   
    }
        
    .add {
        background: #22c55e;
        color: white;
    }
        
    .save {
        background: #2563eb;
        color: white;
        width: 100%; 
    }
        
</style>
</head>

<body>
        
<div class="box">
 <h2>➕ Add Multiple Tasks</h2>
    
    <form method="post">
        {% csrf_token %}
        
        <div id="task-container">

            <!-- FIRST ROW -->
            <div class="task-block">

                <div class="row">
                    <select name="team">
                        <option value="HR">HR</option>
                        <option value="SALES">Sales</option>
                        <option value="IT_ADMIN">IT Admin</option>
                        <option value="CFO">CFO</option>
                        <option value="PRACTICE_HEAD">Practice Head</option>
                        <option value="PRINCIPAL_ENGINEER">Principal Engineer</option>
                    </select>

                    <input type="date" name="date">
                    <input type="text" name="task" placeholder="Task">
                    <input type="time" name="start_time">
                    <input type="number" step="0.1" name="hours" placeholder="Hours">
                </div>
                
                <textarea name="comments" placeholder="Comments"></textarea>

            </div>
            
        </div>
        
        <button type="button" class="btn add" onclick="addTask()">+ Add Another Task</button>
        
        <button type="submit" class="btn save">Save All Tasks</button>
    </form>
    
</div>

<script>
function addTask() {

    let container = document.getElementById("task-container");

    let div = document.createElement("div");
    div.classList.add("task-block");

    div.innerHTML = `
        <div class="row">
            <select name="team">
                <option value="HR">HR</option>
                <option value="SALES">Sales</option>
                <option value="IT_ADMIN">IT Admin</option>
                <option value="CFO">CFO</option>
                <option value="PRACTICE_HEAD">Practice Head</option>
                <option value="PRINCIPAL_ENGINEER">Principal Engineer</option>
            </select>

            <input type="date" name="date">
            <input type="text" name="task" placeholder="Task">
            <input type="time" name="start_time">
            <input type="number" step="0.1" name="hours" placeholder="Hours">
        </div>

        <textarea name="comments" placeholder="Comments"></textarea>
    `;

    container.appendChild(div);
}
</script>

</body>
</html>
