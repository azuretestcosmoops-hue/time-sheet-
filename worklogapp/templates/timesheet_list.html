<!DOCTYPE html>
<html>
<head>
    <title>Your Timesheets</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }

        .container {
            width: 90%;
            margin: 40px auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        h1 {
            color: #1e293b;
        }

        .btn {
            background: #2563eb;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 6px;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #f1f5f9;
        }

        .delete-btn {
            background: red;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="top-bar">
        <h1>Your Timesheets</h1>
        <a href="{% url 'create_timesheet' %}" class="btn">+ Create New</a>
    </div>

    <table>
        <tr>
            <th>Date</th>
            <th>Hours</th>
            <th>Description</th>
            <th>Action</th>
        </tr>

        {% for t in timesheets %}
        <tr>
            <td>{{ t.date }}</td>
            <td>{{ t.hours }}</td>
            <td>{{ t.description }}</td>
            <td>
                <form method="POST" action="{% url 'delete_timesheet' t.id %}">
                    {% csrf_token %}
                    <button class="delete-btn">Delete</button>
                </form>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No Timesheets Found</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
